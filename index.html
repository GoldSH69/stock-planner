<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Asset Master v3.0</title>

<style>
* { box-sizing: border-box; }
body { font-family:'Malgun Gothic'; background:#f4f7f9; padding:10px; }
.container { max-width:1100px; margin:auto; }
.card { background:#fff; padding:15px; margin-bottom:15px; border-radius:8px; }
table { width:100%; border-collapse:collapse; }
td,th { border:1px solid #eee; padding:5px; text-align:center; }
input { width:100%; padding:4px; text-align:right; }
.btn { padding:6px 10px; cursor:pointer; }
.gain { color:#3b82f6; }
.loss { color:#ef4444; }
</style>
</head>

<body>
<div class="container">

<div class="card">
총 투자금 <input id="totalBudget" value="0" oninput="numOnly(this)">
기투자금 <input id="currentInvested" value="0" oninput="numOnly(this)">
<div>잔여금: <span id="resRem"></span></div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>코드</th><th>종목명</th><th>평균단가</th><th>수량</th>
<th>현재가</th><th>평가액</th><th>수익률</th><th>삭제</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<button onclick="addStock()">+ 추가</button>
<button onclick="fetchPrices(this)">시세</button>
<button onclick="saveToGist()">저장</button>
</div>

</div>

<script>
let stocks=[];
const FILENAME="stock.json";

// ===== 숫자 =====
const pN=v=>Number(String(v).replace(/,/g,''))||0;
const fN=v=>Number(v||0).toLocaleString();

function numOnly(el){
    el.value=el.value.replace(/[^0-9]/g,'');
    calculate();
}
function blurFormat(el){
    el.value=fN(pN(el.value));
}

// ===== 데이터 =====
function addStock(){
    stocks.push({code:'',name:'',avg:0,qty:0,curr:0});
    render();
}
function del(i){
    stocks.splice(i,1);
    render();
}
function upd(i,k,v){ stocks[i][k]=v; }
function updNum(i,k,v){
    stocks[i][k]=pN(v);
    calculate();
}

// ===== 렌더 =====
function render(){
    const tb=document.getElementById("tbody");
    tb.innerHTML="";
    const frag=document.createDocumentFragment();

    stocks.forEach((s,i)=>{
        const ev=s.curr*s.qty;
        const buy=s.avg*s.qty;
        const rate=buy?((ev-buy)/buy*100).toFixed(2):0;
        const cls=rate<0?'loss':'gain';

        const tr=document.createElement("tr");
        tr.innerHTML=`
        <td><input value="${s.code}" onchange="upd(${i},'code',this.value)"></td>
        <td><input value="${s.name}" onchange="upd(${i},'name',this.value)"></td>
        <td><input value="${fN(s.avg)}"
            oninput="updNum(${i},'avg',this.value)"
            onblur="blurFormat(this)"></td>
        <td><input value="${fN(s.qty)}"
            oninput="updNum(${i},'qty',this.value)"
            onblur="blurFormat(this)"></td>
        <td>${fN(s.curr)}</td>
        <td>${fN(ev)}</td>
        <td class="${cls}">${rate}%</td>
        <td><button onclick="del(${i})">X</button></td>
        `;
        frag.appendChild(tr);
    });

    tb.appendChild(frag);
    calculate();
}

// ===== 계산 =====
function calculate(){
    const b=pN(totalBudget.value);
    const i=pN(currentInvested.value);
    resRem.innerText=fN(b-i);
}

// ===== KIS API =====
let TOKEN="";

async function getToken(){
    const res=await fetch("https://openapi.koreainvestment.com:9443/oauth2/tokenP",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            grant_type:"client_credentials",
            appkey:"YOUR_APP_KEY",
            appsecret:"YOUR_APP_SECRET"
        })
    });
    const d=await res.json();
    TOKEN=d.access_token;
}

async function fetchPrices(btn){
    btn.disabled=true;

    for(let s of stocks){
        if(!s.code) continue;

        try{
            const res = await fetch(`https://etf-stock.ashywindy.workers.dev?code=${s.code}`);
            const data = await res.json();
            s.curr = Number(data.price) || 0;
        }catch(e){
            console.log("실패", s.code);
        }
    }

    render();
    btn.disabled=false;
}

// ===== GIST =====
async function saveToGist(){
    const token=localStorage.getItem("ghToken");
    let id=localStorage.getItem("gistId");

    if(!token) return alert("GitHub 토큰 필요");

    const payload={
        description:"stock",
        public:false,
        files:{
            [FILENAME]:{
                content:JSON.stringify({stocks},null,2)
            }
        }
    };

    const res=await fetch(
        id?`https://api.github.com/gists/${id}`:"https://api.github.com/gists",
        {
            method:id?"PATCH":"POST",
            headers:{
                Authorization:`token ${token}`,
                "Content-Type":"application/json"
            },
            body:JSON.stringify(payload)
        }
    );

    const data=await res.json();
    if(!id) localStorage.setItem("gistId",data.id);

    alert("저장 완료");
}

// ===== 시작 =====
render();
</script>
</body>
</html>
